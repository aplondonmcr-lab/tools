<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MCR URL Tools</title>

<style>

* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background-color: #f0f4f8;
  margin: 0;
  padding: 1.25rem 0.75rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 0.95rem;
}

.tabs {
  display: flex;
  margin-bottom: 0.75rem;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.tab-button {
  padding: 0.5rem 0.9rem;
  border: none;
  border-radius: 6px;
  background-color: #e0e0e0;
  cursor: pointer;
  font-size: 0.9rem;
  transition: background-color 0.3s ease;
}

.tab-button.active {
  background-color: #0077cc;
  color: white;
}

.tool {
  display: none;
  background-color: #ffffff;
  padding: 1rem;
  border-radius: 10px;
  box-shadow: 0 3px 6px rgba(0, 0, 0, 0.08);
  width: 95%;
  max-width: 520px;
}

.tool.active {
  display: block;
}

h1 {
  font-size: 1.1rem;
  margin: 0 0 0.75rem 0;
  text-align: center;
}

h2 {
  font-size: 1rem;
  margin-bottom: 0.75rem;
  text-align: center;
}

label {
  display: block;
  margin-bottom: 0.35rem;
  font-weight: bold;
  font-size: 0.9rem;
}

input[type="text"],
input[type="number"],
textarea {
  width: 100%;
  padding: 0.5rem;
  font-size: 0.9rem;
  border: 1px solid #ccc;
  border-radius: 6px;
  margin-bottom: 0.75rem;
  font-family: inherit;
}

textarea {
  min-height: 90px;
  resize: vertical;
}

button {
  width: 100%;
  padding: 0.55rem;
  font-size: 0.9rem;
  background-color: #0077cc;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.3s ease;
  margin-bottom: 0.2rem;
}

button:hover {
  background-color: #005fa3;
}

.result {
  margin-top: 0.2rem;
  font-size: 0.9rem;
  text-align: left;
  white-space: pre-line;
  word-break: break-all;
}

.result strong {
  display: block;
  margin-bottom: 0.1rem;
}

.error {
  color: #b00020;
  margin-bottom: 0.4rem;
  font-size: 0.85rem;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 0.6rem;
}

.checkbox-row input[type="checkbox"] {
  width: auto;
  margin-bottom: 0;
}

.result-row {
  display: flex;
  gap: 0.4rem;
  align-items: center;
  margin-top: 0.25rem;
}

.result-row input[type="text"] {
  flex: 1;
  margin-bottom: 0;
}

.result-row button {
  width: auto;
  padding: 0.4rem 0.6rem;
  margin-bottom: 0;
  white-space: nowrap;
  font-size: 0.85rem;
}

p.small {
  margin-top: 0;
  margin-bottom: 0.75rem;
  font-size: 0.85rem;
}

@media (max-width: 400px) {
  h1, h2 {
    font-size: 1rem;
  }

  body {
    font-size: 0.9rem;
  }
}

</style>
</head>

<body>

<h1>MCR URL Tools</h1>

<div class="tabs">
  <button class="tab-button active" onclick="switchTab('untvReformatter')">
    UNTV URL Reformatter
  </button>

  <button class="tab-button" onclick="switchTab('srt')">
    SRT URL Builder
  </button>

  <button class="tab-button" onclick="switchTab('ytplaylist')">
    YouTube Playlist Builder
  </button>
</div>


<!-- UNTV URL Reformatter -->

<div id="untvReformatter" class="tool active">

<label for="untvInput">Enter UN WebTV page URL</label>

<textarea
  id="untvInput"
  placeholder="Paste URL e.g. https://webtv.un.org/en/asset/k1d/k1dh49l59x">
</textarea>

<button onclick="reformatUntvUrl()">Reformat URL</button>
<button onclick="resetUntv()">Reset</button>

<div id="untvError" class="error"></div>

<div class="result" id="untvResult">

<strong>Reformatted URL</strong>

<div class="result-row">
  <input type="text" id="untvOutput" readonly />
  <button type="button" onclick="copyUntvUrl()">Copy</button>
</div>

</div>
</div>

<!-- SRT URL Builder -->

<div id="srt" class="tool">

<label for="ipInput">IP Address (n.n.n.n)</label>
<input type="text" id="ipInput" placeholder="e.g. 10.0.0.1" />

<label for="portInput">Port Number</label>
<input type="number" id="portInput" placeholder="e.g. 9000" min="1" max="65535" />

<div class="checkbox-row">
  <input type="checkbox" id="addPassphraseCheckbox" onchange="togglePassphrase()" />
  <label for="addPassphraseCheckbox" style="margin-bottom:0;font-weight:normal;">
    Add Passphrase
  </label>
</div>

<div id="passphraseContainer" style="display:none;">
  <label for="passphraseInput">Please enter a valid passphrase</label>
  <input type="text" id="passphraseInput" />
</div>

<button onclick="buildSrtUrl()">Build SRT URL</button>
<button onclick="resetSrt()">Reset</button>

<div id="srtError" class="error"></div>

<div class="result" id="srtResult">

<strong>SRT URL</strong>

<div class="result-row">
  <input type="text" id="srtUrlOutput" readonly />
  <button type="button" onclick="copySrtUrl()">Copy</button>
</div>

</div>
</div>


<!-- YouTube Playlist Builder -->

<div id="ytplaylist" class="tool">

<p class="small">
Paste any text that contains YouTube URLs or video IDs (titles, notes, etc.).<br/>
The tool will extract the IDs, de-duplicate them, and build a playlist URL.
</p>

<label for="ytBulkInput">Paste text with YouTube URLs</label>

<textarea
  id="ytBulkInput"
  placeholder="e.g. titles + https://youtu.be/... links, etc.">
</textarea>

<button onclick="buildYoutubePlaylist()">Build Playlist URL</button>
<button onclick="resetYoutubePlaylist()">Reset</button>

<div id="ytError" class="error"></div>

<div class="result" id="ytResult">

<strong>Playlist URL</strong>

<div class="result-row">
  <input type="text" id="ytPlaylistUrl" readonly />
  <button type="button" onclick="copyYoutubePlaylist()">Copy</button>
</div>

</div>
</div>


<script>

/* Tab Handling */

function switchTab(tabId) {

  document.querySelectorAll('.tool')
    .forEach(t => t.classList.remove('active'));

  document.querySelectorAll('.tab-button')
    .forEach(b => b.classList.remove('active'));

  document.getElementById(tabId).classList.add('active');

  document
    .querySelector('.tab-button[onclick*="' + tabId + '"]')
    .classList.add('active');

}


/* UNTV URL Reformatter */

function reformatUntvUrl() {

  const raw = document.getElementById('untvInput').value.trim();
  const errorEl = document.getElementById('untvError');
  const outputEl = document.getElementById('untvOutput');

  errorEl.textContent = '';
  outputEl.value = '';

  if (!raw) {
    errorEl.textContent = 'Please paste a UN WebTV page URL.';
    return;
  }

  const match = raw.match(/k1[a-zA-Z0-9]+$/);

  if (!match) {
    errorEl.textContent =
      'Could not find a valid UN WebTV asset ID in the URL.';
    return;
  }

  const assetId = match[0];
  const entryId = '1_' + assetId.slice(2);

  const reformattedUrl =
    'https://cdnapisec.kaltura.com/p/2503451/embedPlaykitJs/uiconf_id/49754663?iframeembed=true&entry_id=' +
    entryId;

  outputEl.value = reformattedUrl;

}

function copyUntvUrl() {

  const value = document.getElementById('untvOutput').value;
  if (!value) return;

  navigator.clipboard.writeText(value);

}

function resetUntv() {

  document.getElementById('untvInput').value = '';
  document.getElementById('untvOutput').value = '';
  document.getElementById('untvError').textContent = '';

}


/* Remaining JS unchanged */

</script>

</body>
</html>
